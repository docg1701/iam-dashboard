# Front-End Specification Template
# This YAML template provides a structured format for documenting front-end specifications
# Based on the IAM Dashboard project architecture and UX requirements

metadata:
  title: "${PROJECT_NAME} - Front-End Specification"
  version: "${VERSION}"
  date: "${DATE}"
  author: "${AUTHOR}"
  status: "${STATUS}" # draft, review, approved, obsolete

# User Experience Foundation
ux_foundation:
  target_personas:
    - name: "sysadmin"
      role: "Platform Administrator"
      description: "Focused on maintenance, monitoring and general system configuration"
      interface_needs: "Functional and informative interface"
    
    - name: "admin_user" 
      role: "Office Administrator"
      description: "Manages clients and users within the office"
      interface_needs: "Overview and control over organization data"
    
    - name: "common_user"
      role: "Lawyer/End User"
      description: "Primary consumer of AI agents"
      interface_needs: "Extremely efficient journey with minimal friction"

  usability_goals:
    - name: "Efficiency"
      description: "Allow lawyer to go from login to document draft generation in minimal time"
    
    - name: "Clarity" 
      description: "Provide instant and clear feedback on asynchronous task status"
    
    - name: "Low Cognitive Load"
      description: "Clean and direct design avoiding information overload"

  design_principles:
    - "Function above Form: Priority is task execution"
    - "Processing Transparency: User always knows what system is doing"
    - "Predictive Consistency: Use consistent interface patterns"
    - "Accessibility by Default: WCAG AA standard compliance"

# Information Architecture
information_architecture:
  navigation_structure:
    primary_navigation:
      type: "ui.header"
      persistent: true
      elements:
        - "Custom office logo"
        - "Dashboard link (home page)"
        - "Clients area link"
        - "User menu with logout"
    
    secondary_navigation:
      - "Client list to client details navigation"
      - "Document upload access from client details"
    
    breadcrumbs:
      component: "ui.breadcrumbs"
      usage: "Nested screens for location assistance"
      example: "Dashboard > Clients > [Client Name]"

  site_map:
    - name: "Login Screen"
      path: "/login"
      
    - name: "Dashboard (Control Panel)"
      path: "/dashboard" 
      children:
        - name: "Agent: Questionnaire Writer"
          path: "/agents/questionnaire"
        
    - name: "Client Management"
      path: "/clients"
      children:
        - name: "Client List"
          path: "/clients/list"
        - name: "Client Details"
          path: "/clients/{client_id}"
        - name: "Document Upload"
          path: "/clients/{client_id}/upload"

# User Flows
user_flows:
  - name: "Document Ingestion and Processing"
    objective: "Upload PDF document for specific client for AI agent processing"
    entry_points: ["Client Details page"]
    success_criteria:
      - "Document uploaded and classified successfully"
      - "User receives immediate notification of processing start"
      - "Document status updates to 'Completed' after processing"
      - "System prevents duplicate content upload for same client"
    
    steps:
      - "Start at 'Client Details' screen"
      - "Click 'Upload Document'"
      - "Select local PDF file"
      - "Classify document: 'simple' or 'complex'"
      - "Click 'Send'"
      - "System verifies content hash"
      - "Create asynchronous processing task"
      - "Display notification: 'Processing started'"
      - "Document status changes to 'Processing'"
      - "Backend executes extraction (OCR if 'complex')"
      - "Backend stores vectors in DB"
      - "Interface updates status to 'Completed'"
    
    error_handling:
      - "Upload failure: Error notification appears"
      - "Invalid file: Validate PDF and inform user"
      - "Processing failure: Status changes to 'Failed' with retry option"

  - name: "Draft Generation via Structured Form"
    objective: "Generate 'Judicial Questions' draft by filling structured form"
    entry_points: ["Dashboard"]
    success_criteria:
      - "User can select client and fill required form fields"
      - "High-quality draft is generated and displayed"
      - "User can easily copy generated text"
    
    steps:
      - "Start at Dashboard"
      - "Click 'Judicial Questions Writer'"
      - "Open agent interface"
      - "Select client from list"
      - "System validates client has completed documents"
      - "Display specific form fields for task"
      - "User fills form: profession, disease, dates, etc."
      - "Click 'Generate Draft'"
      - "Display progress indicator"
      - "Agent uses RAG to search document context"
      - "Agent sends form data + context to Gemini API"
      - "API returns draft"
      - "Draft displayed in text area"
      - "Enable 'Copy Text' button"
    
    error_handling:
      - "Form validation: Required fields and correct formats"
      - "Gemini API failure: Clear error message with retry suggestion"
      - "Insufficient information: Use form data primarily, indicate missing complementary info"
      - "Long generation: Use spinner or progress indicator"

# UI Components and Layouts
layouts:
  dashboard:
    purpose: "Main entry point after login with quick access to autonomous agents"
    structure:
      header:
        component: "ui.header"
        fixed: true
        elements: ["Application name", "User menu for logout"]
      
      body:
        component: "ui.grid"
        content: "Available agents displayed as clickable cards"
        card_elements: ["ui.icon", "ui.label with descriptive title"]
      
      footer:
        component: "ui.footer or ui.page_sticky"
        content: "Task tracking component for ongoing processes"

  client_management:
    purpose: "List, search and register new clients"
    structure:
      title: "Client Management"
      action_button:
        component: "ui.button"
        text: "Register New Client"
        action: "Opens ui.dialog with registration form"
      
      client_table:
        component: "ui.table"
        columns: ["Name", "CPF", "Date of Birth"]
        features: ["Integrated search box", "Quick client filtering"]

  client_details:
    purpose: "Display client information, list processed documents, allow new uploads"
    structure:
      breadcrumbs:
        component: "ui.breadcrumbs"
        example: "Dashboard > Clients > Client Name"
      
      client_info:
        component: "ui.card"
        content: "Client data (Name, CPF, etc.)"
      
      documents_section:
        upload_component: "ui.upload"
        upload_features: ["PDF file selection", "ui.select for 'simple' or 'complex' classification"]
        
        documents_table:
          component: "ui.table" 
          columns: ["File Name", "Upload Date", "Status"]
          features: ["Visual status indicators"]

  agent_interface:
    purpose: "Guide user through structured data input for agent task execution"
    structure:
      stepper:
        component: "ui.stepper"
        steps:
          - name: "Context"
            content: "Client selection via ui.select with document validation"
          
          - name: "Data Collection"
            content: "Form with required fields (ui.input, ui.date, etc.) with validation"
          
          - name: "Generation and Result"
            content: "Generate button, ui.spinner during processing, ui.textarea for result, Copy button"

# Component Library / Design System
component_library:
  buttons:
    component: "ui.button"
    variants:
      primary: "Main actions (ex: 'Generate')"
      secondary: "Support actions (ex: 'Cancel')" 
      link: "Flat style (.props('flat'))"
    
    states: ["Default", "Hover", "Focused", "Disabled (.bind_enabled_from)"]
    usage_guideline: "Use primary button only once per view area"

  form_fields:
    components: ["ui.input", "ui.select", "ui.date"]
    purpose: "Structured data collection in agent forms and client registration"
    states: ["Default", "Focused", "Error (with validation message)"]
    usage_guideline: "All fields must have clear label. Real-time validation for immediate feedback"

  cards:
    component: "ui.card"
    purpose: "Visually group related information (client data, agent interface)"
    usage_guideline: "Main content container for organized and clean interface"

  tables:
    component: "ui.table" 
    purpose: "Display data lists (clients, documents)"
    features: ["Search", "Pagination", "Row click navigation to details"]

  notifications:
    component: "ui.notify"
    purpose: "Quick non-obstructive user feedback"
    variants:
      success: "Green"
      error: "Red" 
      info: "Blue"
    usage_guideline: "Confirm actions or inform about errors"

# Visual Identity and Style Guide
visual_identity:
  colors:
    base_palette: "Professional and neutral (gray tones, white, corporate blue as primary)"
    customizable_tokens: ["Primary color (buttons, links, highlights)", "Logo"]
    semantic_colors:
      success: "Green (success notifications, 'Completed' status)"
      warning: "Yellow ('Processing' status)"
      error: "Red (failure notifications, validation errors, 'Failed' status)"

  typography:
    font_family: "Clean sans-serif with high readability (ex: Inter, Lato)"
    scale: "Clear typographic scale for titles (H1, H2), subtitles and body text"

  iconography:
    library: "Standard open-source icon set (ex: Material Icons via Quasar/NiceGUI)"

  spacing_layout:
    grid_system: "8px-based spacing for all padding and margins"

# Accessibility Requirements  
accessibility:
  compliance_target: "WCAG AA minimum standard"
  
  visual_requirements:
    color_contrast: "4.5:1 minimum ratio for all text/background combinations"
    focus_indicators: "Clear and visible focus indicators for interactive elements"
  
  interaction_requirements:
    keyboard_navigation: "Fully navigable and operable using keyboard only"
    screen_reader_support: "Appropriate ARIA labels for non-textual elements"
  
  content_requirements:
    form_labels: "All form fields associated with ui.label"
    semantic_structure: "Logical heading structure for navigation"

# Responsiveness Strategy
responsiveness:
  approach: "Mobile-first design expanding to larger screens"
  framework: "Tailwind CSS breakpoint prefixes (md:, lg:) natively supported by NiceGUI"
  
  breakpoints:
    mobile: "< 768px"
    tablet: ">= 768px" 
    desktop: ">= 1024px"
  
  adaptation_patterns:
    grids: "Single column on mobile, multi-column grid on larger screens"
    tables: "Hide less critical columns on small screens to avoid excessive horizontal scrolling"
    navigation: "Collapse primary navigation into hamburger menu with ui.left_drawer on mobile"

# Animation and Microinteractions
animations:
  principles: "Subtle and functional, focused on user feedback and usability perception"
  
  key_microinteractions:
    action_feedback: "Smooth transition on button/clickable element hover/click"
    loading_indicators: "Standardized ui.spinner and ui.linear_progress for all ongoing operations"
    notifications: "Smooth appear/disappear transitions for ui.notify"

# Performance Considerations
performance:
  goals: "Fast interface loading and instant response to user interactions"
  
  design_strategies:
    perceived_loading: "Loading placeholders (ui.skeleton) for slow-loading data areas"
    optimized_rendering: "Use @ui.refreshable pattern to update only changing UI parts"

# Development Guidelines
development:
  file_structure: "Follow app/ directory structure with ui_components/ for interface elements"
  
  naming_conventions:
    functions: "snake_case"
    classes: "PascalCase" 
    constants: "UPPER_SNAKE_CASE"
    private_attributes: "_leading_underscore"
  
  code_patterns:
    component_structure: |
      def component_name() -> None:
          """Brief component description."""
          with ui.column().classes("container-classes"):
              ui.label("Title").classes("title-classes")
              
              with ui.row().classes("row-classes"):
                  ui.button("Action", on_click=handle_action)
  
  testing_strategy:
    browser_automation: "Use Playwright MCP for all browser/UI/UX testing"
    test_types: ["Unit tests", "Integration tests", "E2E tests"]

# Technical Integration
technical_integration:
  backend_api: "FastAPI endpoints for data operations"
  database: "PostgreSQL with pgvector extension"
  ai_integration: "Google Gemini API for document processing and text generation"
  async_processing: "Agno autonomous agents for document processing"
  authentication: "Python-JOSE with 2FA (PyOTP)"
  dependency_injection: "python-dependency-injector framework"

# Validation and Approval
validation:
  checklist:
    - "User flows defined"
    - "Essential component inventory complete"  
    - "Accessibility requirements defined (WCAG AA)"
    - "Clear responsiveness strategy (mobile-first)"
    - "Customizable visual identity requirement documented"
    - "Performance goals established"
    - "Technical integration specified"
    - "Testing strategy defined"
  
  approval_process:
    - "Team review"
    - "High-fidelity mockup creation"
    - "Architecture handoff"
    - "Development implementation"

# Implementation Notes
implementation:
  priority_components: "Focus on MVP agent interfaces first"
  customization_strategy: "Token-based theming for client branding"
  progressive_enhancement: "Core functionality works without JavaScript enhancements"
  deployment_considerations: "VPS Ubuntu Server deployment with Caddy reverse proxy"