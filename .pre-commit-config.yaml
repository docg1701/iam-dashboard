# Pre-commit configuration for Multi-Agent IAM Dashboard
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  # General file quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Python - Backend code quality
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.7
    hooks:
      # Run the linter
      - id: ruff
        name: ruff lint (backend)
        files: ^apps/backend/
        args: [ --fix ]
      # Run the formatter
      - id: ruff-format
        name: ruff format (backend)
        files: ^apps/backend/

  # Python - Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        name: mypy type check (backend)
        files: ^apps/backend/src/
        additional_dependencies:
          - types-redis
          - types-requests
          - pydantic
          - sqlmodel
          - fastapi
        args: [--config-file=apps/backend/pyproject.toml]

  # Python - Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: '1.8.0'
    hooks:
      - id: bandit
        name: bandit security check (backend)
        files: ^apps/backend/src/
        args: [-c, apps/backend/pyproject.toml]

  # TypeScript/JavaScript - Frontend code quality
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0
    hooks:
      - id: eslint
        name: eslint (frontend)
        files: ^apps/frontend/src/.*\.(ts|tsx|js|jsx)$
        additional_dependencies:
          - '@typescript-eslint/eslint-plugin@^8.0.0'
          - '@typescript-eslint/parser@^8.0.0'
          - 'eslint-config-next@15.4.5'
          - 'typescript@^5'
        args: [--fix]

  # TypeScript - Type checking
  - repo: local
    hooks:
      - id: tsc
        name: TypeScript type check (frontend)
        entry: bash -c 'cd apps/frontend && npm run type-check'
        language: system
        files: ^apps/frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # Prettier for frontend formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: prettier format (frontend)
        files: ^apps/frontend/.*\.(ts|tsx|js|jsx|json|md|yaml|yml)$
        additional_dependencies:
          - prettier@^3.0.0

  # Docker
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: hadolint (Dockerfile linting)
        files: Dockerfile.*

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  # Commit message format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        name: conventional commit format
        stages: [commit-msg]

# Global exclusions
exclude: |
  (?x)^(
    .*\.lock$|
    .*\.min\.(js|css)$|
    node_modules/|
    \.venv/|
    htmlcov/|
    \.next/|
    \.secret-vault/
  )$

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false